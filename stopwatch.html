<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .stopwatch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .time-display {
            font-size: 5rem;
            color: white;
            font-weight: 300;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .current-time {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
            font-weight: 300;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        button {
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .stop-btn {
            padding: 14px 50px;
            font-size: 1rem;
            background: #ff4757;
            color: white;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
            letter-spacing: 1px;
        }

        .stop-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 71, 87, 0.4);
        }

        .stop-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            padding: 14px 50px;
            font-size: 1rem;
            background: #ff4757;
            color: white;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 71, 87, 0.4);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .lap-btn {
            padding: 10px 35px;
            font-size: 1rem;
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            letter-spacing: 1px;
        }

        .lap-btn:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .lap-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="stopwatch-container">
        <div>
            <div class="time-display" id="display">00:00</div>

        </div>

        <div class="buttons-container">
            <button class="stop-btn" id="startBtn" onclick="startStopwatch()">Start</button>
            <button class="stop-btn" id="stopBtn" onclick="stopStopwatch()" style="display:none;">Stop</button>
            <button class="reset-btn" id="resetBtn" onclick="resetStopwatch()" style="display:none;">Reset</button>
        </div>
    </div>

    <script>
        let minutes = 0;
        let seconds = 0;
        let milliseconds = 0;
        let isRunning = false;
        let intervalId;

        const display = document.getElementById('display');
        const currentTime = document.getElementById('current');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateDisplay() {
            const m = String(minutes % 60).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            const timeStr = `${m}:${s}`;
            display.textContent = timeStr;
            currentTime.textContent = timeStr;
        }

        function startStopwatch() {
            if (!isRunning) {
                isRunning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'block';
                resetBtn.style.display = 'block';

                intervalId = setInterval(() => {
                    milliseconds += 10;
                    if (milliseconds >= 1000) {
                        milliseconds = 0;
                        seconds++;
                        if (seconds >= 60) {
                            seconds = 0;
                            minutes++;
                        }
                    }
                    updateDisplay();
                }, 10);
            }
        }

        function stopStopwatch() {
            isRunning = false;
            clearInterval(intervalId);
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            resetBtn.style.display = 'none';
        }

        function resetStopwatch() {
            stopStopwatch();
            milliseconds = 0;
            seconds = 0;
            minutes = 0;
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>

</html>
