<!DOCTYPE html>


<head>

    <title>Forex Trading Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            color: #f1f5f9;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
        }


        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .currency-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .currency-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), 0 8px 12px rgba(0, 0, 0, 0.4);
            background: #334155;
        }

        .currency-pair {
            font-size: 1.5em;
            font-weight: bold;
            color: #f1f5f9;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .rate-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #475569;
        }

        .rate-label {
            color: #cbd5e1;
            font-size: 0.9em;
        }

        .rate-value {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            font-weight: 600;
            color: #f1f5f9;
        }

        .indicator {
            font-size: 1.2em;
            font-weight: bold;
        }

        .up {
            color: #22c55e;
        }

        .down {
            color: #ef4444;
        }

        .last-updated {
            font-size: 0.85em;
            color: #94a3b8;
            margin-top: 12px;
            text-align: right;
        }

        .converter-section {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .converter-section:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2), 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .converter-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #f1f5f9;
            margin-bottom: 24px;
            text-align: center;
        }

        .converter-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.9em;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group select,
        .form-group input {
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group select:hover,
        .form-group input:hover {
            border-color: #64748b;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .convert-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .convert-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5), 0 6px 12px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .convert-btn:active {
            transform: translateY(0);
        }

        .result-container {
            grid-column: 1 / -1;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #475569;
        }

        .result-label {
            color: #cbd5e1;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #22c55e;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }


        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .cards-container {
                grid-template-columns: 1fr;
            }

            .converter-content {
                grid-template-columns: 1fr;
            }

            .currency-card {
                padding: 16px;
            }

            .converter-section {
                padding: 20px;
            }

            .result-container {
                grid-column: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Forex Trading Dashboard</h1>


        <div class="cards-container" id="cardsContainer"></div>


        <div class="converter-section">
            <h2 class="converter-title">Currency Converter</h2>
            <div class="converter-content">
                <div class="form-group">
                    <label for="fromCurrency">From:</label>
                    <select id="fromCurrency">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="PKR">PKR</option>
                        <option value="AED">AED</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="toCurrency">To:</label>
                    <select id="toCurrency">
                        <option value="PKR">PKR</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="AED">AED</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" placeholder="Enter amount" value="1" min="0">
                </div>

                <button class="convert-btn" onclick="convertCurrency()">Convert</button>

                <div class="result-container">
                    <div class="result-label">Result:</div>
                    <div class="result-value" id="result">0 PKR</div>
                </div>
            </div>
        </div>
    </div>

    <script>

        const baseRates = {
            USD_PKR: 278.50,
            EUR_PKR: 301.20,
            GBP_PKR: 350.10,
            USD_EUR: 0.92,
            USD_AED: 3.67
        };

        let rates = JSON.parse(JSON.stringify(baseRates));


        const rateChanges = {
            USD_PKR: { current: baseRates.USD_PKR, previous: baseRates.USD_PKR },
            EUR_PKR: { current: baseRates.EUR_PKR, previous: baseRates.EUR_PKR },
            GBP_PKR: { current: baseRates.GBP_PKR, previous: baseRates.GBP_PKR },
            USD_EUR: { current: baseRates.USD_EUR, previous: baseRates.USD_EUR },
            USD_AED: { current: baseRates.USD_AED, previous: baseRates.USD_AED }
        };


        const currencyPairs = [
            { key: 'USD_PKR', from: 'USD', to: 'PKR' },
            { key: 'EUR_PKR', from: 'EUR', to: 'PKR' },
            { key: 'GBP_PKR', from: 'GBP', to: 'PKR' },
            { key: 'USD_EUR', from: 'USD', to: 'EUR' },
            { key: 'USD_AED', from: 'USD', to: 'AED' }
        ];

        function initializeDashboard() {
            const cardsContainer = document.getElementById('cardsContainer');

            currencyPairs.forEach(pair => {
                const card = document.createElement('div');
                card.className = 'currency-card';
                card.id = `card-${pair.key}`;
                card.innerHTML = `
                    <div class="currency-pair">${pair.from} / ${pair.to}</div>
                    <div class="rate-row">
                        <span class="rate-label">Buy:</span>
                        <span class="rate-value">
                            <span id="rate-${pair.key}-buy">${rates[pair.key].toFixed(2)}</span>
                            <span class="indicator" id="indicator-${pair.key}-buy"></span>
                        </span>
                    </div>
                    <div class="rate-row">
                        <span class="rate-label">Sell:</span>
                        <span class="rate-value">
                            <span id="rate-${pair.key}-sell">${(rates[pair.key] + 0.70).toFixed(2)}</span>
                            <span class="indicator" id="indicator-${pair.key}-sell"></span>
                        </span>
                    </div>
                    <div class="last-updated">Updated: 1 min ago</div>
                `;
                cardsContainer.appendChild(card);
            });
        }


        function fluctuateRates() {
            Object.keys(rates).forEach(key => {

                rateChanges[key].previous = rateChanges[key].current;


                const fluctuation = (Math.random() - 0.5) * 0.01 * rates[key];
                rates[key] += fluctuation;


                rateChanges[key].current = rates[key];


                updateCardRate(key);
            });
        }


        function updateCardRate(key) {
            const buyRate = rates[key];
            const sellRate = buyRate + 0.70;
            const previousRate = rateChanges[key].previous;


            document.getElementById(`rate-${key}-buy`).textContent = buyRate.toFixed(2);
            document.getElementById(`rate-${key}-sell`).textContent = sellRate.toFixed(2);


            const isUp = buyRate >= previousRate;
            const buyIndicator = document.getElementById(`indicator-${key}-buy`);
            const sellIndicator = document.getElementById(`indicator-${key}-sell`);

            if (isUp) {
                buyIndicator.textContent = '▲';
                buyIndicator.className = 'indicator up';
                sellIndicator.textContent = '▲';
                sellIndicator.className = 'indicator up';
            } else {
                buyIndicator.textContent = '▼';
                buyIndicator.className = 'indicator down';
                sellIndicator.textContent = '▼';
                sellIndicator.className = 'indicator down';
            }
        }


        function convertCurrency() {
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            const amount = parseFloat(document.getElementById('amount').value) || 1;

            if (fromCurrency === toCurrency) {
                document.getElementById('result').textContent = `${amount.toFixed(2)} ${toCurrency}`;
                return;
            }

            let conversionRate = getConversionRate(fromCurrency, toCurrency);
            let result = amount * conversionRate;

            document.getElementById('result').textContent = `${result.toFixed(2)} ${toCurrency}`;
        }


        function getConversionRate(from, to) {

            const directKey = `${from}_${to}`;
            if (rates[directKey]) {
                return rates[directKey];
            }


            const reverseKey = `${to}_${from}`;
            if (rates[reverseKey]) {
                return 1 / rates[reverseKey];
            }


            const fromToPKR = rates[`${from}_PKR`] || (1 / rates[`PKR_${from}`]);
            const toToPKR = rates[`${to}_PKR`] || (1 / rates[`PKR_${to}`]);

            return fromToPKR / toToPKR;
        }


        document.addEventListener('DOMContentLoaded', () => {
            initializeDashboard();
            convertCurrency();
        });


        setInterval(() => {
            fluctuateRates();
        }, 3000);


        document.getElementById('amount').addEventListener('input', convertCurrency);
        document.getElementById('fromCurrency').addEventListener('change', convertCurrency);
        document.getElementById('toCurrency').addEventListener('change', convertCurrency);
    </script>
</body>

</html>
