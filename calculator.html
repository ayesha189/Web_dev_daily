<!DOCTYPE html>


<head>

    <title> My Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #000;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(79, 59, 59, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: auto;
        }

        .display {
            background-color: #1a1a1a;
            color: #fff;
            font-size: 2em;
            padding: 20px;
            text-align: right;
            border-radius: 5px;
            min-height: 60px;
            word-wrap: break-word;
            word-break: break-all;
            min-width: 200px;
        }

        .main {
            display: flex;
            gap: 20px;
        }

        .operators {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .number-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            width: 60px;
            height: 60px;
        }

        button:hover {
            opacity: 1.1;
        }

        .num {
            background-color: #000;
            color: #fff;
            border: 1px solid #333;
        }

        .operator {
            background-color: #ff9500;
            color: white;
        }

        .equals {
            background-color: #ff9500;
            color: white;
        }

        .clear {
            background-color: #ff9500;
            color: white;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="main">
            <div class="operators">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button class="operator" onclick="appendOperator('-')">−</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                <button class="equals" onclick="calculate()">=</button>
            </div>
            <div class="number-buttons">
                <button class="num" onclick="appendNumber('7')">7</button>
                <button class="num" onclick="appendNumber('8')">8</button>
                <button class="num" onclick="appendNumber('9')">9</button>
                <button class="num" onclick="appendNumber('4')">4</button>
                <button class="num" onclick="appendNumber('5')">5</button>
                <button class="num" onclick="appendNumber('6')">6</button>
                <button class="num" onclick="appendNumber('1')">1</button>
                <button class="num" onclick="appendNumber('2')">2</button>
                <button class="num" onclick="appendNumber('3')">3</button>
                <button class="num" onclick="appendNumber('0')">0</button>
                <button class="num" onclick="appendNumber('.')">.</button>
            </div>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let input = '0';

        function appendNumber(num) {
            if (input === '0') {
                input = num;
            } else {
                input += num;
            }
            display.textContent = input;
        }

        function appendOperator(op) {
            if (input !== '0') {
                input += op;
            }
            display.textContent = input;
        }

        function clearDisplay() {
            input = '0';
            display.textContent = input;
        }

        function calculate() {
            try {
                input = eval(input).toString();
                display.textContent = input;
            } catch (e) {
                display.textContent = 'Error';
                input = '0';
            }
        }

    </script>
</body>

</html>
